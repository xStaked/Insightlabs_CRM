name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: insightlabs
          POSTGRES_USER: insightlabs
          POSTGRES_PASSWORD: insightlabs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insightlabs -d insightlabs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: ci
      DEBUG: "false"
      API_V1_PREFIX: /api/v1
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_MINUTES: 10080
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: insightlabs
      POSTGRES_USER: insightlabs
      POSTGRES_PASSWORD: insightlabs
      REDIS_URL: redis://localhost:6379/0
      CORS_ORIGINS: http://localhost:3000

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check app tests

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build image
        run: docker build -t insightlabs-backend-ci .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
